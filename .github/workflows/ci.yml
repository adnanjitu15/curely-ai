name: Python Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out the repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip' # Speeds up installations by caching pip packages
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
        # We also install flake8 and pytest explicitly just in case
        pip install flake8 pytest pytest-asyncio httpx
        
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Lint code with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
        # exit-zero treats all errors as warnings. 
        # The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Run Pytest test suite
      env:
        # Dummy environment variables needed for tests to pass if your code checks for them
        OPENAI_API_KEY: "test_key"
        GEMINI_API_KEY: "test_key"
      run: |
        pytest app/tests/ -v --disable-warnings
