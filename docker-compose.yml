version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Use an exact value or pass through from host env:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # Map the local uploads folder to persist uploaded files during dev
      - ./uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./medical-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Optional if frontend needed an API url config:
      # - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped
